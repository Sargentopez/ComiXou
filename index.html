<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>ComiXow</title>
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="ComiXow">
  <meta property="og:title"       content="ComiXow — Crea y Comparte">
  <meta property="og:description" content="Arte Humano, Para Humanos">
  <meta property="og:image"       content="https://comixow.com/icon-512.png">
  <meta property="og:image:width"  content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:url"         content="https://comixow.com/">
  <meta name="twitter:card"       content="summary">
  <meta name="twitter:image"      content="https://comixow.com/icon-512.png">
  <link rel="apple-touch-icon"    href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/home.css">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Comic+Neue:wght@400;700&family=Nunito:wght@400;600;700;900&family=Oswald:wght@400;700&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Cabecera fija: inyectada por header.js, persiste entre vistas -->
  <!-- Vistas SPA: se renderizan aquí -->
  <div id="appView"></div>
  <div class="toast" id="toast"></div>

  <!-- Core -->
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/genres.js"></script>
  <!-- seed.js desactivado — solo para desarrollo local -->
  <!-- <script src="js/seed.js"></script> -->

  <!-- Router SPA -->
  <script src="js/router.js"></script>

  <!-- Lógica de cada vista -->
  <script src="js/home.js"></script>
  <script src="js/auth-pages.js"></script>
  <script src="js/editor-layers.js"></script>
  <script src="js/editor-pages.js"></script>
  <script src="js/omggif.js"></script>
  <script src="js/pako.min.js"></script>
  <script src="js/UPNG.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/logo-data.js"></script>
  <script src="js/reader.js"></script>
  <script src="js/admin.js"></script>

  <!-- Fullscreen -->
  <script src="js/fullscreen.js"></script>

  <!-- My comics view -->
  <script src="js/my-comics.js"></script>

  <!-- Registro de vistas -->
  <script src="js/views.js"></script>

  <!-- Header persistente -->
  <script src="js/header.js"></script>

  <!-- PWA -->
  <script src="js/pwa.js"></script>

  <!-- Arrancar -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Router.start();
    });
    // Al volver del reader con history.back(), recuperar fullscreen si la app estaba en él
    window.addEventListener('pageshow', function(e) {
      if (sessionStorage.getItem('cx_was_fs') === '1') {
        sessionStorage.removeItem('cx_was_fs');
        // Solo pedir fullscreen si no estamos ya en él
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          const el = document.documentElement;
          const req = el.requestFullscreen || el.webkitRequestFullscreen;
          if (req) req.call(el).catch(() => {});
        }
      }
    });
  </script>

</body>
</html>
