<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="only light">
  <link rel="manifest" href="../manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Ver creación – ComiXou</title>
  <link rel="stylesheet" href="../css/main.css?v=8.35">
  <link rel="stylesheet" href="../css/reader.css?v=8.35">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Nunito:wght@400;600;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
</head>
<body class="reader-page">

<!-- Barra superior: solo PC -->
<div class="reader-topbar" id="readerTopbar">
  <div class="home-logo-area" style="flex-direction:row;align-items:center;gap:6px">
    <a href="../index.html" class="logo-link logo-img-link">
      <img src="../logo.svg" alt="ComiXou" class="logo-img" style="height:22px;width:auto;">
    </a>
  </div>
  <div class="reader-info">
    <span class="reader-comic-title" id="readerComicTitle"></span>
    <span class="reader-panel-num"   id="readerPanelNum">1 / 1</span>
  </div>
</div>

<!-- Área de lectura -->
<div class="reader-stage" id="readerStage"></div>

<!-- Flechas de navegación: solo PC, discretas, sobre el stage -->
<button class="reader-arrow reader-arrow-left"  id="prevBtn" title="Anterior">‹</button>
<button class="reader-arrow reader-arrow-right" id="nextBtn" title="Siguiente">›</button>

<!-- Fin del cómic -->
<div class="reader-end-overlay hidden" id="endOverlay">
  <div class="end-card">
    <div class="end-icon">🎉</div>
    <h2>¡Fin de la obra!</h2>
    <div class="end-actions">
      <button class="btn btn-outline" id="restartBtn">↩ Volver al inicio</button>
      <a href="../index.html" class="btn btn-primary">🏠 Salir</a>
    </div>
  </div>
</div>

<!-- Hint swipe móvil -->
<div class="swipe-hint" id="swipeHint">👉 Desliza para avanzar</div>

<!-- Versión — desaparece tras 4s -->
<div id="readerVersion" style="position:fixed;bottom:8px;left:8px;font-size:11px;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.45);padding:2px 7px;border-radius:8px;z-index:9999;pointer-events:none;">v8.35</div>

<div class="toast" id="toast"></div>

<script src="../js/utils.js?v=8.35"></script>
<script src="../js/i18n.js?v=8.35"></script>
<script src="../js/auth.js?v=8.35"></script>
<script src="../js/storage.js?v=8.35"></script>
<script src="../js/logo-data.js"></script>
<script src="../js/reader.js?v=8.35"></script>
<script src="../js/pwa.js?v=8.35"></script>
</body>
</html>
