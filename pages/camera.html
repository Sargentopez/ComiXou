<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Cámara</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#000;
  overflow:hidden;
  touch-action:none;
}
#video {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  touch-action:none;
}
#controls {
  position:fixed;
  bottom:0; left:0; right:0;
  padding:20px 32px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:linear-gradient(transparent, rgba(0,0,0,0.6));
}
#btnClose {
  width:44px; height:44px; border-radius:50%;
  background:rgba(0,0,0,0.45);
  border:1.5px solid rgba(255,255,255,0.4);
  color:#fff; font-size:1.3rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
#btnCapture {
  width:68px; height:68px; border-radius:50%;
  background:#fff;
  border:4px solid rgba(255,255,255,0.6);
  box-shadow:0 0 0 3px rgba(255,255,255,0.3);
  cursor:pointer; transition:transform .1s;
}
#btnCapture:active { transform:scale(0.92); }
#btnFlip {
  width:44px; height:44px; border-radius:50%;
  background:rgba(0,0,0,0.45);
  border:1.5px solid rgba(255,255,255,0.4);
  color:#fff; font-size:1.3rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
#zoomBadge {
  position:fixed; top:16px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.55); color:#fff;
  font-size:1rem; font-weight:700;
  padding:4px 14px; border-radius:20px;
  pointer-events:none; opacity:0;
  transition:opacity .4s;
  font-family:system-ui,sans-serif;
}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<div id="zoomBadge">1.0×</div>
<div id="controls">
  <button id="btnClose">✕</button>
  <button id="btnCapture"></button>
  <button id="btnFlip">🔄</button>
</div>
<script>
const video   = document.getElementById('video');
const badge   = document.getElementById('zoomBadge');
let stream    = null;
let facing    = 'environment';
let zoom      = 1, zoomMin = 1, zoomMax = 5, hwZoom = false;
let pinchDist0 = null, zoom0 = 1;
const ptrs    = new Map();
let closed    = false;

// ── Resolución = doble del lienzo (1800×2340 → ×2) ──
const RES_W = 3600, RES_H = 4680;

function startStream(f) {
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  navigator.mediaDevices.getUserMedia({
    video:{ facingMode:f, width:{ideal:RES_W}, height:{ideal:RES_H} }, audio:false
  }).then(s=>{
    if(closed){ s.getTracks().forEach(t=>t.stop()); return; }
    stream = s; video.srcObject = s;
    // Detectar zoom de hardware
    const track = s.getVideoTracks()[0];
    if(track?.getCapabilities){
      const caps = track.getCapabilities();
      if(caps.zoom){ hwZoom=true; zoomMin=caps.zoom.min||1; zoomMax=Math.min(caps.zoom.max||5,10); }
    }
  }).catch(()=>{ parent.postMessage({type:'camera:error'},'*'); });
}

function applyZoom(z){
  zoom = Math.max(zoomMin, Math.min(zoomMax, z));
  if(hwZoom && stream){
    const t = stream.getVideoTracks()[0];
    if(t) t.applyConstraints({advanced:[{zoom}]}).catch(()=>{});
  } else {
    video.style.transform = zoom>1 ? `scale(${zoom})` : '';
  }
  badge.textContent = zoom.toFixed(1)+'×';
  badge.style.opacity = '1';
  clearTimeout(badge._t);
  badge._t = setTimeout(()=>{ badge.style.opacity='0'; }, 1500);
}

function pinchDist(m){ const [a,b]=[...m.values()]; return Math.hypot(a.x-b.x,a.y-b.y); }

document.addEventListener('pointerdown', e=>{
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2){ pinchDist0=pinchDist(ptrs); zoom0=zoom; }
}, {capture:true});
document.addEventListener('pointermove', e=>{
  if(!ptrs.has(e.pointerId)) return;
  ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(ptrs.size===2 && pinchDist0){
    e.preventDefault();
    applyZoom(zoom0*(pinchDist(ptrs)/pinchDist0));
  }
}, {capture:true, passive:false});
const endPtr = e=>{ ptrs.delete(e.pointerId); if(ptrs.size<2) pinchDist0=null; };
document.addEventListener('pointerup',     endPtr, {capture:true});
document.addEventListener('pointercancel', endPtr, {capture:true});

function closeCamera(){
  closed = true;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  video.pause(); video.srcObject=null;
}

document.getElementById('btnClose').addEventListener('click', ()=>{
  closeCamera();
  parent.postMessage({type:'camera:cancel'},'*');
});

document.getElementById('btnFlip').addEventListener('click', ()=>{
  facing = facing==='environment' ? 'user' : 'environment';
  startStream(facing);
});

document.getElementById('btnCapture').addEventListener('click', ()=>{
  if(!stream) return;
  const canvas = document.createElement('canvas');
  const track  = stream.getVideoTracks()[0];
  const s      = track.getSettings();
  // Zoom CSS: recortar área visible
  if(!hwZoom && zoom>1){
    const sw = Math.round((s.width||video.videoWidth)/zoom);
    const sh = Math.round((s.height||video.videoHeight)/zoom);
    const sx = Math.round(((s.width||video.videoWidth)-sw)/2);
    const sy = Math.round(((s.height||video.videoHeight)-sh)/2);
    canvas.width=sw; canvas.height=sh;
    canvas.getContext('2d').drawImage(video,sx,sy,sw,sh,0,0,sw,sh);
  } else {
    canvas.width  = s.width  || video.videoWidth;
    canvas.height = s.height || video.videoHeight;
    canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
  }
  closeCamera();
  canvas.toBlob(blob=>{
    if(blob) parent.postMessage({type:'camera:photo', blob},'*',[blob]);
  },'image/jpeg',0.92);
});

startStream(facing);
</script>
</body>
</html>
