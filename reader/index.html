<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ComXow — Lector</title>
  <meta name="theme-color" content="#111111">

  <!-- Open Graph / WhatsApp / Telegram / Twitter preview -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="ComiXou">
  <meta property="og:title"       content="ComiXou — Arte Humano, Para Humanos">
  <meta property="og:description" content="Descubre esta creación en ComiXou, plataforma de arte visual e ilustración">
  <meta property="og:image"       content="https://comixow.com/icon-512.png">
  <meta property="og:image:width"  content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:url"         content="https://comixow.com/reader/">
  <meta name="twitter:card"       content="summary">
  <meta name="twitter:title"      content="ComiXou — Crea y Comparte">
  <meta name="twitter:description" content="Abre esta creación en ComiXou">
  <meta name="twitter:image"      content="https://comixow.com/icon-512.png">

  <!-- Fuentes autoalojadas (WOFF2) — sin dependencia de conectividad -->
  <link rel="stylesheet" href="../fonts/fonts.css">
  <!-- Fallback Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Comic+Neue:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Oswald:wght@400;700&family=Patrick+Hand&family=Permanent+Marker&family=Press+Start+2P&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="reader.css?v=30.69">
</head>
<script>
  if ('serviceWorker' in navigator)
    navigator.serviceWorker.getRegistrations().then(r => r.forEach(s => s.unregister()));
</script>
<body>

  <!-- CARGA -->
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-logo">
      <img src="../loading-icon.png?v=30.69" alt="Cargando" style="height:40px;width:auto;">
      <img src="../logo.svg" alt="ComiXou" style="height:40px;width:auto;">
    </div>
    <div id="loadingMsg" class="loading-msg">Cargando obra...</div>
    <div class="loading-progress-wrap">
      <div class="loading-progress-bar" id="loadingBar"></div>
    </div>
    <div class="loading-progress-label" id="loadingLabel"></div>
  </div>

  <!-- ERROR -->
  <div id="errorScreen" class="error-screen hidden">
    <div class="error-card">
      <div class="error-icon">📭</div>
      <h2>Obra no disponible</h2>
      <p id="errorMsg">Esta obra no existe o no está publicada.</p>
      <a href="javascript:history.back()" class="btn-yellow">Volver</a>
    </div>
  </div>

  <!-- REPRODUCTOR -->
  <div id="readerApp" class="reader-app hidden">

    <canvas id="readerCanvas"></canvas>

    <!-- Contenedor scroll para modos horizontal/vertical -->
    <div id="scrollReader"></div>

    <!-- Esquina superior izquierda: fullscreen -->
    <button id="fullscreenToggle" class="corner-btn corner-tl" aria-label="Pantalla completa">[ ]</button>

    <!-- Esquina superior derecha: cerrar -->
    <button id="closeBtn" class="corner-btn corner-tr" aria-label="Cerrar">&#x2715;</button>


    <!-- Toast de instrucciones de navegación -->
    <div id="readerToast" class="reader-toast"></div>

    <!-- Versión — desaparece tras 4s -->
    <div id="readerVersion" style="position:fixed;bottom:8px;left:8px;font-size:11px;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.45);padding:2px 7px;border-radius:8px;z-index:9999;pointer-events:none;">v30.69</div>

  </div>

  <script src="../js/pako.min.js"></script>
  <script src="../js/UPNG.js"></script>
  <script src="../js/fullscreen.js?v=30.69"></script>
  <script src="../js/logo-data.js"></script>
  <script src="../js/icon-data.js"></script>
  <script src="reader.js?v=30.69"></script>
</body>
</html>
