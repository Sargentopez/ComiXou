<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ComiXow — Lector</title>
  <meta name="theme-color" content="#111111">

  <!-- Open Graph / WhatsApp / Telegram / Twitter preview -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="ComiXow">
  <meta property="og:title"       content="ComiXow — Crea y Comparte">
  <meta property="og:description" content="Abre esta obra en el reproductor de ComiXow">
  <meta property="og:image"       content="https://sargentopez.github.io/ComiXou/og-banner.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="400">
  <meta property="og:url"         content="https://sargentopez.github.io/ComiXou/reader/">
  <meta name="twitter:card"       content="summary">
  <meta name="twitter:title"      content="ComiXow — Crea y Comparte">
  <meta name="twitter:description" content="Abre esta obra en el reproductor de ComiXow">
  <meta name="twitter:image"      content="https://sargentopez.github.io/ComiXou/og-banner.png">

  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Comic+Neue:wght@400;700&family=Oswald:wght@400;700&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="reader.css?v=16.21">
</head>
<script>
  if ('serviceWorker' in navigator)
    navigator.serviceWorker.getRegistrations().then(r => r.forEach(s => s.unregister()));
</script>
<body>

  <!-- CARGA -->
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-logo"><img src="../logo_long.png" alt="ComiXow" style="height:40px;width:auto;display:block;margin:0 auto;"></div>
    <div class="loading-spinner"></div>
    <div id="loadingMsg" class="loading-msg">Cargando obra...</div>
  </div>

  <!-- ERROR -->
  <div id="errorScreen" class="error-screen hidden">
    <div class="error-card">
      <div class="error-icon">📭</div>
      <h2>Obra no disponible</h2>
      <p id="errorMsg">Esta obra no existe o no está publicada.</p>
      <a href="javascript:history.back()" class="btn-yellow">Volver</a>
    </div>
  </div>

  <!-- REPRODUCTOR -->
  <div id="readerApp" class="reader-app hidden">

    <canvas id="readerCanvas"></canvas>

    <!-- Contenedor scroll para modos horizontal/vertical -->
    <div id="scrollReader"></div>

    <!-- Esquina superior izquierda: fullscreen -->
    <button id="fullscreenToggle" class="corner-btn corner-tl" aria-label="Pantalla completa">[ ]</button>

    <!-- Esquina superior derecha: cerrar -->
    <button id="closeBtn" class="corner-btn corner-tr" aria-label="Cerrar">&#x2715;</button>

    <!-- Toast de instrucciones de navegación -->
    <div id="readerToast" class="reader-toast"></div>

    <!-- Versión — desaparece tras 4s -->
    <div id="readerVersion" style="position:fixed;bottom:8px;left:8px;font-size:11px;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.45);padding:2px 7px;border-radius:8px;z-index:9999;pointer-events:none;">v16.26</div>

  </div>

  <script src="../js/fullscreen.js?v=16.21"></script>
  <script src="../js/logo-data.js"></script>
  <script src="reader.js?v=16.21"></script>
</body>
</html>
