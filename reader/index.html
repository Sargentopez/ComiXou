<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ComiXow — Lector</title>
  <meta name="theme-color" content="#111111">
  <link rel="stylesheet" href="reader.css">
</head>
<script>
  if ('serviceWorker' in navigator)
    navigator.serviceWorker.getRegistrations().then(r => r.forEach(s => s.unregister()));
</script>
<body>

  <!-- CARGA -->
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-logo">ComiXow</div>
    <div class="loading-spinner"></div>
    <div id="loadingMsg" class="loading-msg">Cargando obra...</div>
  </div>

  <!-- ERROR -->
  <div id="errorScreen" class="error-screen hidden">
    <div class="error-card">
      <div class="error-icon">📭</div>
      <h2>Obra no disponible</h2>
      <p id="errorMsg">Esta obra no existe o no está publicada.</p>
      <a href="javascript:history.back()" class="btn-yellow">Volver</a>
    </div>
  </div>

  <!-- REPRODUCTOR -->
  <div id="readerApp" class="reader-app hidden">

    <!-- Canvas — toda la obra se renderiza aquí -->
    <canvas id="readerCanvas"></canvas>

    <!-- Controles flotantes desktop (pastilla inferior) -->
    <div id="viewerControls" class="viewer-controls">
      <button id="prevBtn"  class="ctrl-btn" aria-label="Anterior">&#8249;</button>
      <span   id="readerCounter" class="ctrl-counter">1 / 1</span>
      <button id="nextBtn"  class="ctrl-btn" aria-label="Siguiente">&#8250;</button>
      <button id="closeBtn" class="ctrl-btn ctrl-close" aria-label="Cerrar">&#x2715;</button>
    </div>

    <!-- Botón cerrar móvil (centrado abajo, solo cuando no hay pastilla) -->
    <button id="closeMobileBtn" class="close-mobile" aria-label="Cerrar">&#x2715;</button>

    <!-- Fin de obra -->
    <div id="endOverlay" class="end-overlay hidden">
      <div class="end-card">
        <div class="end-icon">&#127881;</div>
        <h2>¡FIN!</h2>
        <div class="end-actions">
          <button id="restartBtn" class="btn-yellow">&#8635; Volver a empezar</button>
          <a href="javascript:history.back()" class="btn-outline">&#127968; Volver</a>
        </div>
      </div>
    </div>

  </div>

  <script src="reader.js"></script>
</body>
</html>
