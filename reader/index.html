<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ComiXow — Lector</title>
  <meta name="theme-color" content="#111111">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bebas+Neue&family=Comic+Neue:wght@400;700&family=Oswald:wght@400;700&family=Patrick+Hand&family=Permanent+Marker&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="reader.css">
</head>
<script>
  if ('serviceWorker' in navigator)
    navigator.serviceWorker.getRegistrations().then(r => r.forEach(s => s.unregister()));
</script>
<body>

  <!-- CARGA -->
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-logo">ComiXow</div>
    <div class="loading-spinner"></div>
    <div id="loadingMsg" class="loading-msg">Cargando obra...</div>
  </div>

  <!-- ERROR -->
  <div id="errorScreen" class="error-screen hidden">
    <div class="error-card">
      <div class="error-icon">📭</div>
      <h2>Obra no disponible</h2>
      <p id="errorMsg">Esta obra no existe o no está publicada.</p>
      <a href="javascript:history.back()" class="btn-yellow">Volver</a>
    </div>
  </div>

  <!-- REPRODUCTOR -->
  <div id="readerApp" class="reader-app hidden">

    <!-- Canvas — toda la obra se renderiza aquí -->
    <canvas id="readerCanvas"></canvas>

    <!-- Botón fullscreen: centrado arriba, mismo estilo que los controles -->
    <div id="fullscreenBtn" class="viewer-controls viewer-controls-top">
      <button class="viewer-btn" id="fullscreenToggle" aria-label="Pantalla completa">[ ]</button>
    </div>

    <!-- Controles desktop: pastilla ◀ contador ▶ ✕ (oculta en táctil) -->
    <div id="viewerControls" class="viewer-controls">
      <button id="prevBtn"       class="viewer-btn" aria-label="Anterior">&#9664;</button>
      <span   id="readerCounter" class="viewer-counter">1 / 1</span>
      <button id="nextBtn"       class="viewer-btn" aria-label="Siguiente">&#9654;</button>
      <button id="closeBtn"      class="viewer-btn viewer-close-inline" aria-label="Cerrar">&#x2715;</button>
    </div>

    <!-- Botón cerrar táctil: centrado abajo, solo en pointer:coarse -->
    <button id="closeBtnTouch" class="viewer-btn viewer-close-touch" aria-label="Cerrar">&#x2715;</button>

  </div>

  <script src="reader.js"></script>
</body>
</html>
